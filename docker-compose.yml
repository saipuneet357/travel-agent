services:
  redis:
    image: redis/redis-stack-server:latest
    restart: always
    volumes:
      - redis_volume_data:/data
    ports:
      - 6379:6379
  redis_insight:
    image: redislabs/redisinsight:1.14.0
    restart: always
    ports:
      - 8001:8001
    volumes:
      - redis_insight_volume_data:/db

  postgres:
    image: postgres:16
    # restart: unless-stopped # Commented out to allow container to be stopped and started
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-puneet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-puneet}
      POSTGRES_DB: ${POSTGRES_DB:-lara}
    ports:
      - "5432:5432"
    volumes:
      # Persistent storage for database data
      - postgres_data:/var/lib/postgresql/data
      # Optional: Mount an initialization folder for SQL scripts
      # - ./initdb:/docker-entrypoint-initdb.d
    # healthcheck:
    #   test: ["CMD-SHELL", "pg_isready -U puneet -d lara"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5

  # mysql:
  #   image: mysql:latest
  #   environment:
  #     MYSQL_ROOT_PASSWORD: my-secret-pw
  #     # uncomment below if you want to automatically create and select a database
  #     MYSQL_DATABASE: my_database
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysql-data:/var/lib/mysql

volumes:
  redis_volume_data:
  redis_insight_volume_data:
  postgres_data:
  # mysql-data: